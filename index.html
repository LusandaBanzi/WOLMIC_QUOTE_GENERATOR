<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Of Life Ministries International Church</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

:root{
    --gold:#ffd700;
    --light-gold:#fff099;
    --glass:rgba(255,255,255,0.1);
    --border:rgba(255,255,255,0.2);
    --text:#fff;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
    padding:20px;
    color:white;

    background:
    linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.85)),
    url("logo1.png");

}

#particleCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:1;
}

.container{
    position:relative;
    z-index:2;
    width:100%;
    max-width:850px;
}

h1{
    color:var(--gold);
    margin-bottom:30px;
    text-transform:uppercase;
    letter-spacing:2px;
    font-size:2.4rem;
    animation:pulseGlow 3s infinite alternate;
}

.quote-card{
    background:var(--glass);
    backdrop-filter:blur(12px);
    border:1px solid var(--border);
    border-radius:25px;
    padding:40px;
    min-height:260px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    box-shadow:0 8px 32px rgba(0,0,0,.3);
}

.quote-text{
    font-size:1.8rem;
    line-height:1.5;
    margin-bottom:20px;
    transition:.5s;
}

.quote-author{
    color:var(--light-gold);
    font-size:1rem;
    letter-spacing:1px;
    transition:.5s;
}

.fade-out{
    opacity:0;
    transform:translateY(-15px);
}

.progress-bar-container{
    width:100%;
    height:5px;
    background:rgba(255,255,255,.15);
    border-radius:10px;
    overflow:hidden;
    margin-top:25px;
}

.progress-bar{
    width:0%;
    height:100%;
    background:var(--gold);
    box-shadow:0 0 10px var(--gold);
}

@keyframes pulseGlow{
    from{
        text-shadow:0 0 10px rgba(255,215,0,.4);
    }
    to{
        text-shadow:0 0 30px rgba(255,215,0,.9);
    }
}

@media(max-width:768px){
    h1{
        font-size:1.5rem;
    }

    .quote-text{
        font-size:1.3rem;
    }

    .quote-card{
        padding:25px;
    }
}
</style>
</head>

<body>

<canvas id="particleCanvas"></canvas>

<div class="container">
    <h1>Word Of Life Ministries International Church</h1>

    <div class="quote-card">
        <p class="quote-text" id="quote">Loading divine inspiration...</p>
        <p class="quote-author" id="author"></p>

        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>
</div>

<script>

const quotes = [
{ text:"Faith does not eliminate questions. Faith knows where to take them.", author:"Word of Life" },
{ text:"God never takes away something from your life without replacing it with something better.", author:"Word of Life" },
{ text:"Your potential is the sum of all the possibilities God has for your life.", author:"Word of Life" },
{ text:"Faith is taking the first step even when you don't see the whole staircase.", author:"Martin Luther King Jr." },
{ text:"God does not call the qualified, He qualifies the called.", author:"Word of Life" },
{ text:"What you are is God's gift to you, what you become is your gift to God.", author:"Hans Urs von Balthasar" },
{ text:"Starve your distractions, feed your focus, and trust God's timing.", author:"Word of Life" },
{ text:"Anxiety happens when you think you have to figure out everything all at once. Trust God.", author:"Word of Life" },
{ text:"God is not looking for extraordinary people, but for people who will love Him extraordinarily.", author:"Word of Life" },
{ text:"Your break-down is just a setup for your great break-through.", author:"Word of Life" },
{ text:"Faith is building an ark when there is no rain in sight.", author:"Word of Life" },
{ text:"When you cannot find your footing, lean on the Rock that is higher than you.", author:"Word of Life" },
{ text:"God’s grace is sufficient for you, and His strength is made perfect in weakness.", author:"2 Corinthians 12:9" },
{ text:"Let your life reflect the faith you have in God.", author:"Word of Life" },
{ text:"The cross shows us that God will go to any length to bring us back to Himself.", author:"Word of Life" },
{ text:"Do not let your hearts be troubled. Trust in God.", author:"John 14:1" },
{ text:"God will make a way where there seems to be no way.", author:"Word of Life" },
{ text:"Keep your eyes on God. He is the author and perfecter of your faith.", author:"Word of Life" },
{ text:"Every trial you face is an opportunity to see God’s power at work.", author:"Word of Life" },
{ text:"You are fearfully and wonderfully made.", author:"Psalm 139:14" }
];

const quoteText = document.getElementById("quote");
const quoteAuthor = document.getElementById("author");
const progressBar = document.getElementById("progressBar");

let currentQuote = 0;
const displayDuration = 5000;

function showQuote(){

    quoteText.classList.add("fade-out");
    quoteAuthor.classList.add("fade-out");

    setTimeout(() => {

        const q = quotes[currentQuote];

        quoteText.textContent = `"${q.text}"`;
        quoteAuthor.textContent = `— ${q.author}`;

        quoteText.classList.remove("fade-out");
        quoteAuthor.classList.remove("fade-out");

        currentQuote++;
        if(currentQuote >= quotes.length){
            currentQuote = 0;
        }

        startProgress();

    },400);
}

function startProgress(){

    progressBar.style.transition = "none";
    progressBar.style.width = "0%";

    setTimeout(() => {
        progressBar.style.transition = `width ${displayDuration}ms linear`;
        progressBar.style.width = "100%";
    },50);
}

showQuote();
setInterval(showQuote, displayDuration);

/* GOLD PARTICLES */

const canvas = document.getElementById("particleCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();

window.addEventListener("resize", resizeCanvas);

const particles = [];

for(let i=0;i<120;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*3+1,
        speed:Math.random()*1.5+0.5
    });
}

function animateParticles(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle="rgba(255,215,0,0.8)";
        ctx.fill();

        p.y -= p.speed;

        if(p.y < 0){
            p.y = canvas.height;
            p.x = Math.random()*canvas.width;
        }
    });

    requestAnimationFrame(animateParticles);
}

animateParticles();

</script>

</body>
</html>
